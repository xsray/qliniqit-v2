services:
  - type: web
    name: qliniqit-v2
    runtime: node
    plan: free
    region: oregon
    buildCommand: npx --yes pnpm@9 install && npx pnpm@9 run build
    startCommand: node dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: UNSUBSCRIBE_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: AWS_REGION
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: VITE_APP_URL
        value: https://qliniqit-v2.onrender.com
